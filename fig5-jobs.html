<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冲击精确落在职业生涯的入口</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;color:#1d1d1f;line-height:1.5;padding:0;}
  .fig{max-width:920px;margin:0 auto;background:#fff;border:none;border-radius:0;padding:0;box-shadow:none;}
  .eyebrow{font-size:11.5px;font-weight:600;letter-spacing:.4px;color:#0066cc;margin-bottom:8px;}
  h1{font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:5px;}
  .thesis{font-size:12.5px;color:#424245;max-width:780px;margin-bottom:4px;}
  svg{display:block;width:100%;height:auto;margin:0 0 2px;}
  .gl{stroke:#ededf0;stroke-width:1;}
  .axis{stroke:#c7c7cc;stroke-width:1;}
  .axlabel{font-size:11px;fill:#86868b;}
  .src{font-size:10.5px;color:#86868b;margin-top:14px;padding-top:12px;border-top:1px solid #ededf0;line-height:1.6;}
  .src b{color:#6e6e73;}
</style>
</head>
<body>
<div class="fig">
  <svg id="chart" viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif"></svg>

  <div style="font-size:10.5px;color:#86868b;line-height:1.55;margin-top:7px;">数据来源：斯坦福数字经济实验室（Brynjolfsson 团队），基于 ADP 工资单数据，2022 年底 ChatGPT 发布后的相对就业变化。</div>
  <div style="font-size:12px;color:#1d1d1f;line-height:1.55;margin-top:4px;">图 5：2022 年底以来，22–25 岁在 AI 高暴露职业的相对就业下降约 13%（入门级软件 −20%、客服 −11%），同职业资深者反升 6–13%——冲击落在职业生涯入口。</div>
</div>

<script>
(function(){
  const svg = document.getElementById('chart');
  const VW = 760, VH = 460;

  // Layout constants
  const LEFT_LABEL = 20;   // left edge of label text
  const LEFT_BAR = 240;    // where bars start (0-baseline)
  const RIGHT_EDGE = 720;
  const TOP = 60;
  const ROW_H = 72;

  // Data: [label, value, isRange, rangeMin, rangeMax]
  const data = [
    { label: "22–25 岁 · AI 高暴露职业（总体）", sub: null,       val: -13, isRange: false },
    { label: "　└ 入门级软件开发",               sub: null,       val: -20, isRange: false },
    { label: "　└ 客服",                         sub: null,       val: -11, isRange: false },
    { label: "同职业 · 资深从业者",              sub: null,       val: null, isRange: true, rMin: 6, rMax: 13 },
  ];

  // Scale: map percentage value → x coordinate
  // Domain: -25 to +20 (percentage points)
  const domainMin = -25, domainMax = 20;
  const barWidth = RIGHT_EDGE - LEFT_BAR;
  function xScale(val) {
    return LEFT_BAR + (val - domainMin) / (domainMax - domainMin) * barWidth;
  }
  const x0 = xScale(0); // baseline x

  // Grid line values
  const gridVals = [-20, -15, -10, -5, 0, 5, 10, 15, 20];

  let html = '';

  // Grid lines
  gridVals.forEach(v => {
    const x = xScale(v);
    const isZero = v === 0;
    if (isZero) {
      // zero baseline — drawn separately below
    } else {
      html += `<line class="gl" x1="${x}" y1="${TOP - 20}" x2="${x}" y2="${TOP + data.length * ROW_H + 10}"/>`;
    }
    // x-axis label
    const labelY = TOP + data.length * ROW_H + 30;
    html += `<text class="axlabel" x="${x}" y="${labelY}" text-anchor="middle">${v > 0 ? '+' + v : v}%</text>`;
  });

  // Zero baseline (draw on top of grid, after rows)
  const zeroLineTop = TOP - 20;
  const zeroLineBottom = TOP + data.length * ROW_H + 10;

  // Bars
  const BAR_H = 28;
  const COLOR_NEG = '#b5654a';
  const COLOR_POS = '#0066cc';
  const COLOR_RANGE = '#0066cc';

  data.forEach((d, i) => {
    const cy = TOP + i * ROW_H + ROW_H / 2;
    const barY = cy - BAR_H / 2;

    // Row label
    const isIndented = d.label.startsWith('　└');
    const labelFontSize = isIndented ? 12 : 13.5;
    const labelWeight = isIndented ? 400 : 600;
    const labelColor = isIndented ? '#6e6e73' : '#1d1d1f';
    html += `<text x="${LEFT_LABEL}" y="${cy + 4.5}" font-size="${labelFontSize}" font-weight="${labelWeight}" fill="${labelColor}" dominant-baseline="middle" text-anchor="start">${d.label}</text>`;

    if (d.isRange) {
      // Range bar
      const xMin = xScale(d.rMin);
      const xMax = xScale(d.rMax);
      html += `<rect x="${xMin}" y="${barY}" width="${xMax - xMin}" height="${BAR_H}" fill="${COLOR_RANGE}" opacity="0.85" rx="3"/>`;
      // Value label to the right
      html += `<text x="${xMax + 8}" y="${cy + 1}" font-size="13" font-weight="700" fill="${COLOR_RANGE}" dominant-baseline="middle">+${d.rMin} ~ +${d.rMax}%</text>`;
    } else {
      const xVal = xScale(d.val);
      if (d.val < 0) {
        html += `<rect x="${xVal}" y="${barY}" width="${x0 - xVal}" height="${BAR_H}" fill="${COLOR_NEG}" opacity="0.88" rx="3"/>`;
        html += `<text x="${xVal - 8}" y="${cy + 1}" font-size="13" font-weight="700" fill="${COLOR_NEG}" dominant-baseline="middle" text-anchor="end">${d.val}%</text>`;
      } else {
        html += `<rect x="${x0}" y="${barY}" width="${xVal - x0}" height="${BAR_H}" fill="${COLOR_POS}" opacity="0.88" rx="3"/>`;
        html += `<text x="${xVal + 8}" y="${cy + 1}" font-size="13" font-weight="700" fill="${COLOR_POS}" dominant-baseline="middle">+${d.val}%</text>`;
      }
    }
  });

  // Zero baseline line (drawn after bars so it appears on top)
  html += `<line x1="${x0}" y1="${zeroLineTop}" x2="${x0}" y2="${zeroLineBottom}" stroke="#1d1d1f" stroke-width="1.5" opacity="0.4"/>`;

  // Divider between youth and senior rows
  const dividerY = TOP + 3 * ROW_H;
  html += `<line x1="${LEFT_LABEL}" y1="${dividerY}" x2="${RIGHT_EDGE + 10}" y2="${dividerY}" stroke="#ededf0" stroke-width="1.5"/>`;

  // Annotation note
  const noteY = TOP + data.length * ROW_H + 55;
  html += `<text x="${LEFT_LABEL}" y="${noteY}" font-size="12.5" fill="#424245" font-style="normal">
    <tspan font-weight="600" fill="#1d1d1f">同一种技术：</tspan>对入门级是替代，对资深是增强。
  </text>`;

  svg.innerHTML = html;

  // Adjust SVG height to content
  const totalHeight = noteY + 20;
  svg.setAttribute('viewBox', `0 0 ${VW} ${totalHeight}`);
})();
</script>
</div>
<script>(function(){var m=(location.hash.match(/n=(\d+)/)||[])[1];function s(){var el=document.querySelector(".fig")||document.body;try{parent.postMessage({__figN:m,__figH:Math.ceil(el.getBoundingClientRect().height)+6},"*");}catch(e){}}addEventListener("load",s);try{if(document.fonts&&document.fonts.ready)document.fonts.ready.then(s);if(window.ResizeObserver)new ResizeObserver(s).observe(document.querySelector(".fig")||document.body);}catch(e){}[120,400,1000,2200].forEach(function(t){setTimeout(s,t);});})();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恩格斯停顿 · 红利先归资本，隔两代才到工人</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;color:#1d1d1f;line-height:1.5;padding:0;}
  .fig{max-width:920px;margin:0 auto;background:#fff;border:none;border-radius:0;padding:0;box-shadow:none;}
  .eyebrow{font-size:11.5px;font-weight:600;letter-spacing:.4px;color:#0066cc;margin-bottom:8px;}
  h1{font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:5px;}
  .thesis{font-size:12.5px;color:#424245;max-width:780px;margin-bottom:4px;}
  .thesis b{color:#1d1d1f;}
  svg{display:block;width:100%;height:auto;margin:0 0 2px;}
  .gl{stroke:#ededf0;stroke-width:1;}
  .axis{stroke:#c7c7cc;stroke-width:1;}
  .axlabel{font-size:11px;fill:#86868b;}
  .note{font-size:12px;color:#6e6e73;margin-top:8px;line-height:1.6;}
</style>
</head>
<body>
<div class="fig">
  <svg id="chart" viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">
  </svg>

  <div style="font-size:10.5px;color:#86868b;line-height:1.55;margin-top:7px;">数据来源：Allen (2009) <em>Engels' Pause: Technical Change, Capital Accumulation, and Inequality in the British Industrial Revolution, 1780–1840</em>。</div>
  <div style="font-size:12px;color:#1d1d1f;line-height:1.55;margin-top:4px;">图 6：英国工业革命头五十年（1790–1840），人均产出增长五成、工人实际工资几乎不动——红利先归资本；1840 年后红利才扩散、工资迅速追上、差距收窄。迟到约两代人，但终究到了。</div>
</div>

<script>
(function(){
  // ---- data ----
  const outputData = [
    {year:1790, val:100},{year:1800, val:108},{year:1815, val:122},{year:1830, val:138},
    {year:1840, val:150},{year:1860, val:178},{year:1880, val:206},{year:1900, val:235}
  ];
  const wageData = [
    {year:1790, val:100},{year:1800, val:101},{year:1815, val:103},{year:1830, val:107},
    {year:1840, val:110},{year:1860, val:142},{year:1880, val:182},{year:1900, val:214}
  ];

  // ---- layout ----
  const L=80, R=60, T=40, B=60;
  const W=760, H=460;
  const innerW=W-L-R, innerH=H-T-B;

  const xMin=1790, xMax=1900;
  const yMin=90,  yMax=245;

  function x(year){ return L + (year-xMin)/(xMax-xMin)*innerW; }
  function y(val){  return T + (yMax-val)/(yMax-yMin)*innerH; }

  // ---- gridlines & axes ----
  const yTicks=[100,120,140,160,180,200,220,240];
  const xTicks=[1790,1820,1840,1860,1880,1900];

  let svg='';

  // horizontal gridlines
  yTicks.forEach(v=>{
    svg+=`<line class="gl" x1="${L}" y1="${y(v)}" x2="${W-R}" y2="${y(v)}"/>`;
    svg+=`<text class="axlabel" x="${L-8}" y="${y(v)+4}" text-anchor="end">${v}</text>`;
  });

  // axes
  svg+=`<line class="axis" x1="${L}" y1="${T}" x2="${L}" y2="${T+innerH}"/>`;
  svg+=`<line class="axis" x1="${L}" y1="${T+innerH}" x2="${W-R}" y2="${T+innerH}"/>`;

  // x tick labels
  xTicks.forEach(yr=>{
    svg+=`<text class="axlabel" x="${x(yr)}" y="${T+innerH+18}" text-anchor="middle">${yr}</text>`;
  });

  // axis unit label
  svg+=`<text class="axlabel" x="${L-8}" y="${T-10}" text-anchor="middle" font-size="11" fill="#86868b">指数</text>`;

  // ---- gap fill (band between two lines) ----
  // top = outputData path, bottom = wageData path reversed
  const topPts = outputData.map(d=>`${x(d.year)},${y(d.val)}`).join(' ');
  const botPts = [...wageData].reverse().map(d=>`${x(d.year)},${y(d.val)}`).join(' ');
  svg+=`<polygon points="${topPts} ${botPts}" fill="#0066cc" opacity=".07"/>`;

  // ---- output line (blue) ----
  const outPoly = outputData.map(d=>`${x(d.year)},${y(d.val)}`).join(' ');
  svg+=`<polyline points="${outPoly}" fill="none" stroke="#0066cc" stroke-width="3" stroke-linejoin="round"/>`;

  // ---- wage line (earth) ----
  const wagePoly = wageData.map(d=>`${x(d.year)},${y(d.val)}`).join(' ');
  svg+=`<polyline points="${wagePoly}" fill="none" stroke="#b5654a" stroke-width="3" stroke-linejoin="round"/>`;

  // ---- dots ----
  outputData.forEach(d=>{
    svg+=`<circle cx="${x(d.year)}" cy="${y(d.val)}" r="4" fill="#0066cc"/>`;
  });
  wageData.forEach(d=>{
    svg+=`<circle cx="${x(d.year)}" cy="${y(d.val)}" r="4" fill="#b5654a"/>`;
  });

  // ---- 1840 停顿分界（竖虚线 + 顶部标签）----
  svg+=`<line x1="${x(1840)}" y1="${T}" x2="${x(1840)}" y2="${T+innerH}" stroke="#c7c7cc" stroke-width="1" stroke-dasharray="3 4"/>`;
  svg+=`<text x="${x(1840)}" y="${T-12}" font-size="11" font-weight="700" fill="#6e6e73" text-anchor="middle">1840</text>`;

  // ---- 末端系列标签（1900，右侧留白）----
  svg+=`<text x="${x(1900)+7}" y="${y(235)+4}" font-size="12.5" font-weight="600" fill="#0066cc" text-anchor="start">人均产出</text>`;
  svg+=`<text x="${x(1900)+7}" y="${y(214)+4}" font-size="12.5" font-weight="600" fill="#b5654a" text-anchor="start">实际工资</text>`;

  // ---- 停顿期注解（左下，沿贴地的工资线）----
  svg+=`<text x="${x(1815)}" y="${y(118)}" font-size="11.5" font-weight="600" fill="#a4552f" text-anchor="middle">停顿 50 年 · 工资几乎不动</text>`;

  // ---- 1840 后：红利扩散、差距收窄（顶部空白）----
  svg+=`<text x="${x(1860)}" y="${y(239)}" font-size="11.5" fill="#6e6e73" text-anchor="middle">1840 年后红利扩散</text>`;
  svg+=`<text x="${x(1860)}" y="${y(239)+15}" font-size="11.5" fill="#6e6e73" text-anchor="middle">工资迅速追上、差距收窄</text>`;

  document.getElementById('chart').innerHTML = svg;
})();
</script>
<script>(function(){var m=(location.hash.match(/n=(\d+)/)||[])[1];function s(){var el=document.querySelector(".fig")||document.body;try{parent.postMessage({__figN:m,__figH:Math.ceil(el.getBoundingClientRect().height)+6},"*");}catch(e){}}addEventListener("load",s);try{if(document.fonts&&document.fonts.ready)document.fonts.ready.then(s);if(window.ResizeObserver)new ResizeObserver(s).observe(document.querySelector(".fig")||document.body);}catch(e){}[120,400,1000,2200].forEach(function(t){setTimeout(s,t);});})();</script>
</body>
</html>
